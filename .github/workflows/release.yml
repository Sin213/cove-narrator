name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
            [ -z "$v" ] && v="0.0.0-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils tar xz-utils curl libfuse2

      - name: Run Linux build script
        run: |
          chmod +x scripts/build-release.sh
          bash scripts/build-release.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            release/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            release/*.deb
          if-no-files-found: error

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Windows build script
        shell: pwsh
        run: .\build.ps1 -Version $env:VERSION

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            release/*-Setup.exe
          if-no-files-found: error

      - name: Upload Portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            release/*-Portable.exe
          if-no-files-found: error

  publish-release:
    if: github.ref_type == 'tag'
    needs: [resolve-version, build-linux, build-windows]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets and generate checksum bundle
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*-Setup.exe' -o -name '*-Portable.exe' \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          body: |
            ## What's New in v2.1.0

            ### HD Voice Clone — now works on Linux
            - **One-click HD setup on Linux** — HD dependencies install to `~/.local/share/cove-narrator/hd-deps/` automatically, bypassing PEP 668 restrictions on modern distros (Arch, Ubuntu 24.04+, Fedora 39+).
            - **Smooth download progress** — both the dependency install (~5 GB) and the Qwen3-TTS model download (4.3 GB) now show real-time percentage, ETA, and MB counters instead of sitting silent.
            - **Full sentences, no cutoff** — synthesis now uses the model's recommended generation parameters so audio plays to the end without truncating the last word.

            ### Windows improvements
            - **USB-portable model storage** — the Qwen3-TTS model is stored next to the portable exe so the entire app travels on a USB drive.
            - **Light theme fix** — scroll areas now force dark backgrounds so the UI stays consistent on Windows light themes.
            - **Download stability** — model downloads run in a QThread to prevent Qt event-loop crashes, and the portable build shells out to its bundled Python for reliable pip installs.

            ### Downloads

            | File | Platform | Type |
            |------|----------|------|
            | `Cove-Narrator-${{ env.VERSION }}-Setup.exe` | Windows | Installer |
            | `Cove-Narrator-${{ env.VERSION }}-Portable.exe` | Windows | Single-file portable |
            | `cove-narrator-${{ env.VERSION }}.AppImage` | Linux | Portable (any distro) |
            | `cove-narrator_${{ env.VERSION }}_amd64.deb` | Linux | Debian/Ubuntu package |

            Verify downloads with `checksums-sha256.txt`:
            ```
            sha256sum -c checksums-sha256.txt
            ```
          make_latest: true
