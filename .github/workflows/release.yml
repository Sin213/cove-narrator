name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
            [ -z "$v" ] && v="0.0.0-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils tar xz-utils curl libfuse2

      - name: Run Linux build script
        run: |
          chmod +x scripts/build-release.sh
          bash scripts/build-release.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            release/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: |
            release/*.deb
          if-no-files-found: error

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Windows build script
        shell: pwsh
        run: .\build.ps1 -Version $env:VERSION

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: |
            release/*-Setup.exe
          if-no-files-found: error

      - name: Upload Portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: |
            release/*-Portable.exe
          if-no-files-found: error

  smoke-windows:
    # Release-gated: only on version tags. Actually installs the pinned HD deps,
    # downloads the Qwen model, generates a clip, and asserts it is non-degenerate
    # speech — catching the transformers-version (buzzing) regression class.
    # NOTE: windows-latest has Python 3.12 preinstalled, so this does NOT exercise
    # the clean-machine embeddable-Python bootstrap; it validates the deps + model
    # + generation stack only.
    if: github.ref_type == 'tag'
    needs: resolve-version
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      HF_HUB_DISABLE_XET: '1'
      HF_HUB_ENABLE_HF_TRANSFER: '0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Resolve model dir
        shell: pwsh
        run: |
          $dir = "$env:USERPROFILE\.config\cove-narrator\models\qwen3-tts-1.7b"
          "MODEL_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Cache Qwen model (4.3 GB)
        uses: actions/cache@v4
        with:
          path: ${{ env.MODEL_DIR }}
          key: qwen-model-Qwen3-TTS-12Hz-1.7B-Base-v1

      - name: Install base + pinned HD deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # Pins come straight from the app's HD_PACKAGES (single source of truth),
          # installed in one call with pip resolving deps — matching the shipped
          # app's `pip install <HD_PACKAGES>` (no --no-deps; that path was dropped
          # for Linux AppImage stability and would no longer mirror the app).
          python scripts/_extract_hd_packages.py > hd-reqs.txt
          Get-Content hd-reqs.txt
          python -m pip install -r hd-reqs.txt

      - name: Download Qwen model (cached)
        shell: pwsh
        run: |
          python -c "import os; from huggingface_hub import snapshot_download; snapshot_download('Qwen/Qwen3-TTS-12Hz-1.7B-Base', local_dir=os.environ['MODEL_DIR'])"

      - name: HD clone smoke (asserts non-degenerate generation)
        shell: pwsh
        run: python scripts/_hd_clone_smoke.py

  publish-release:
    if: github.ref_type == 'tag'
    needs: [resolve-version, build-linux, build-windows, smoke-windows]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets and generate checksum bundle
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*-Setup.exe' -o -name '*-Portable.exe' \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          body: |
            ## What's New in v2.2.0

            HD Voice Clone (Qwen3-TTS) now works reliably on both Windows portable
            builds and Linux AppImage, with the dependency and model stack fully
            sorted out — plus a release-gated smoke test so it stays that way.

            ### HD Voice Clone
            - **Generates real speech** — ships transformers 4.57.3 (the 5.x port produced degenerate, non-stop buzzing); a guard now purges a stale wrong-version deps dir so a clean, correct stack reinstalls.
            - **Works on Linux AppImage** — frozen Linux uses XDG paths and a system `python3` for multiprocessing; HD deps install in a single dependency-resolving pip call for stability.
            - **Reliable model download** — the portable exe shells out to a real Python for `snapshot_download`, fixing the hang and post-download crash on Windows; downloads to `dependencies/models/` next to the exe (fully USB-portable).
            - **Slimmer, self-contained** — `qwen-tts` is vendored directly (no pip install dragging in gradio/sox/torchaudio); librosa replaced with numpy/scipy to fix startup crashes.

            ### Quality
            - **CI smoke test** — every tagged release now installs the pinned HD deps, downloads the model, generates a clip, and asserts non-degenerate output, blocking the release if HD clone regresses.
            - Wider window resize grip for easier edge grabbing.

            ### Downloads

            | File | Platform | Type |
            |------|----------|------|
            | `Cove-Narrator-${{ env.VERSION }}-Setup.exe` | Windows | Installer |
            | `Cove-Narrator-${{ env.VERSION }}-Portable.exe` | Windows | Single-file portable |
            | `cove-narrator-${{ env.VERSION }}.AppImage` | Linux | Portable (any distro) |
            | `cove-narrator_${{ env.VERSION }}_amd64.deb` | Linux | Debian/Ubuntu package |

            Verify downloads with `checksums-sha256.txt`:
            ```
            sha256sum -c checksums-sha256.txt
            ```
          make_latest: true
